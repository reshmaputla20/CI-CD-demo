name: CD-Pipeline

on: 
    workflow_run:
        workflows: ["CI Pipeline"]
        types:
            - completed

jobs:
    deploy:
        runs-on: self-hosted

        steps:
        - name: Pull Docker Image
          run: sudo docker pull reshmaputla/devops-demo:latest
        - name: Delete Old docker container
          run: sudo docker rm -f devops-demo-container || true
        - name: Run docker container
          run: sudo docker run -d -p 8080:8080 --name devops-demo-container reshmaputla/devops-demo:latest


